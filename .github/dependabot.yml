# Dependabot Configuration
# -----------------------
# Automatically keep dependencies up-to-date by opening Pull Requests.
# 
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # 🐍 Python Dependencies (Poetry)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    # Bundles all Python updates into a single weekly PR
    groups:
      python-dependencies:
        patterns:
          - "*"
    versioning-strategy: "increase"

  # 🤖 GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    # Bundles all Action updates into a single weekly PR
    groups:
      actions-dependencies:
        patterns:
          - "*"
