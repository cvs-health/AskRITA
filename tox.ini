[tox]
envlist = py311,py312,py313,py314,flake8,mypy
isolated_build = true

[testenv]
deps = 
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-mock>=3.10.0
commands = pytest {posargs}

[testenv:flake8]
deps = flake8>=6.0.0
commands = flake8 askrita tests

[testenv:mypy]
deps = 
    mypy>=1.0.0
    types-requests
commands = mypy askrita

[testenv:black]
deps = black>=23.0.0
commands = black --check askrita tests

[testenv:coverage]
deps = 
    pytest>=7.0.0
    pytest-cov>=4.0.0
commands = pytest --cov=askrita --cov-report=html --cov-report=term

[flake8]
max-line-length = 88
exclude = .git,__pycache__,build,dist,.tox,.venv,venv
extend-ignore = E203,W503 