name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"  # Triggered only on version tags (e.g. v0.14.0)

# Strict permissions: only id-token for OIDC publishing; no write to contents
permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publisher (OIDC)
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # Gate: Run the full quality suite before publish
  # All checks must pass before the package is released.
  # ─────────────────────────────────────────────
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: lint-pub-v2-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --only dev

      - name: Black check
        run: poetry run black --check askrita tests

      - name: isort check
        run: poetry run isort --check-only askrita tests

      - name: Flake8
        run: poetry run flake8 askrita tests

      - name: Mypy
        run: poetry run mypy askrita

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: security-pub-v2-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}

      - name: Install dev dependencies
        run: poetry install --only dev

      - name: Bandit SAST scan
        run: poetry run bandit -r askrita -ll -ii

      - name: pip-audit dependency scan
        run: poetry run pip-audit

      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [lint, security]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: test-pub-v2-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --extras exports

      - name: Run tests with coverage (80% threshold enforced)
        run: >
          poetry run pytest tests/ -v
          --tb=short
          --cov=askrita
          --cov-report=term-missing
          --cov-fail-under=80

  # ─────────────────────────────────────────────
  # Validate: version tag matches pyproject.toml
  # Prevents publishing a mismatched version
  # ─────────────────────────────────────────────
  validate-version:
    name: "Validate Version Tag"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "ERROR: Tagged commit is not reachable from origin/main"
            exit 1
          fi
          echo "Tagged commit is reachable from origin/main ✓"

      - name: Check tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Git tag version : $TAG"
          echo "pyproject.toml  : $PYPROJECT_VERSION"
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Version check passed ✓"

      - name: Check CHANGELOG has entry for this version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "\[${TAG}\]" CHANGELOG.md; then
            echo "ERROR: No CHANGELOG.md entry found for version [${TAG}]"
            exit 1
          fi
          echo "CHANGELOG entry found ✓"

  # ─────────────────────────────────────────────
  # Build and Publish (only after all gates pass)
  # Uses PyPI Trusted Publisher (OIDC) — no token stored
  # ─────────────────────────────────────────────
  build-and-publish:
    name: "Build & Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [validate-version]
    environment: pypi  # maps to the PyPI Trusted Publisher environment in repo settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: build-v2-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies (main + extras)
        run: poetry install --only main --extras exports

      - name: Build source and wheel distributions
        run: poetry build

      - name: Verify build artifacts
        run: |
          ls -lh dist/
          echo "Artifacts ready for upload:"
          ls dist/

      - name: Smoke test built wheel in a clean virtualenv
        run: |
          python -m venv .pkg-smoke-venv
          . .pkg-smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import askrita; print('import-ok')"
          askrita --help >/dev/null

      - name: Upload build artifacts (for audit trail)
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30

      - name: Publish to PyPI (via Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true
