name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "Dockerfile.docs"
      - "askrita/**"  # rebuild if source API changes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # for pushing to GHCR

jobs:
  # ─────────────────────────────────────────────
  # Validate: build docs before publishing
  # ─────────────────────────────────────────────
  build-docs:
    name: "Build Documentation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: docs-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            docs-${{ runner.os }}-py3.13-

      - name: Install documentation dependencies
        run: poetry install --with dev --extras exports

      - name: Build documentation (strict – fail on warnings)
        run: poetry run mkdocs build --strict

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Publish: containerise and push docs image
  # ─────────────────────────────────────────────
  publish-docs-image:
    name: "Publish Docs Docker Image"
    runs-on: ubuntu-latest
    needs: [build-docs]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/docs
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max