# Minimal AskRITA Configuration
# This is the minimum configuration required to run AskRITA
# All other settings will use built-in defaults

# Database Configuration (REQUIRED)
database:
  connection_string: "sqlite:///./your_database.db"  # No setup required!
  # Or for PostgreSQL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST:-localhost}:5432/${DB_NAME}"
  # Or for MySQL: "mysql+pymysql://${DB_USER}:${DB_PASSWORD}@${DB_HOST:-localhost}:3306/${DB_NAME}"
  
  # Schema caching for performance (optional)
  cache_schema: true                # Enable schema caching (default: true)
  schema_refresh_interval: 1800     # Cache expiry: 30 minutes (good for development)

# LLM Configuration (REQUIRED)
llm:
  provider: "openai"
  model: "gpt-4o"
  # API key is read from OPENAI_API_KEY environment variable
  # Set it with: export OPENAI_API_KEY="your-api-key-here"

# All other settings (workflow, prompts, business rules, etc.) will use built-in defaults
# For complete configuration options, see other example files

# Optional: Enable Chain of Thoughts tracking for transparent AI reasoning
# Uncomment to enable (see query-with-chain-of-thoughts.yaml for full options)
# chain_of_thoughts:
#   enabled: true                    # Enable step-by-step reasoning tracking
#   include_timing: true             # Show execution time for each step
#   include_confidence: true         # Show confidence scores (0.0-1.0)
#   include_step_details: false      # Minimal details for production

# Optional framework settings (uncomment to override defaults)
# framework:
#   debug: false  # Set to true to enable langchain debug logging 