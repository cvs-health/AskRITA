# Simple Schema Descriptions Example (v0.2.1+)
# Minimal configuration showing the new hybrid schema descriptions feature
# Perfect for getting started with automatic metadata extraction

database:
  connection_string: "bigquery://your-project-id/your-dataset-id"
  query_timeout: 30
  max_results: 1000
  
  # ====================================================================
  # 🧠 NEW: Hybrid Schema Descriptions (Automatic + Manual)
  # ====================================================================
  schema_descriptions:
    # High-level context about your data
    project_context: "Customer analytics and sales data for business insights"
    
    # Automatic description extraction from database metadata
    automatic_extraction:
      enabled: true                         # Let AskRITA automatically extract descriptions
      fallback_to_column_name: true        # Generate descriptions from column names if needed
      include_data_types: true             # Include data types in descriptions
      extract_comments: true               # Use existing database comments
    
    # Optional: Manual enhancements for key business columns
    columns:
      customer_id:
        description: "Unique customer identifier"
        mode: "supplement"                  # Add to automatic description
        business_context: "Primary key for analytics"
      
      order_total:
        description: "Total order value including tax"
        mode: "supplement"
        business_context: "Key revenue metric"
    
    # Optional: Business terms glossary
    business_terms:
      churn: "Customer who hasn't purchased in 90+ days"
      ltv: "Customer Lifetime Value calculation"

llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.1
  max_tokens: 4000
  # Set environment variable: export OPENAI_API_KEY="your-key"

workflow:
  max_retries: 3
  steps:
    parse_question: true
    get_unique_nouns: true
    generate_sql: true
    validate_and_fix_sql: true
    execute_sql: true
    format_results: true
    choose_visualization: true
    format_data_for_visualization: true
    generate_followup_questions: true

framework:
  default_output_format: "text"
  show_metadata: true
  debug: false

# ====================================================================
# 🚀 Benefits of Schema Descriptions:
# ====================================================================
# ✅ Better SQL generation through improved context understanding
# ✅ Automatic metadata extraction reduces manual configuration  
# ✅ Business glossary helps AI understand domain-specific terms
# ✅ Manual overrides provide precise control where needed
# ✅ Works with existing BigQuery table/column comments

# ====================================================================
# 📝 Quick Start:
# ====================================================================
# 1. Set automatic_extraction.enabled: true
# 2. Add your project_context description
# 3. Optionally add key column descriptions
# 4. Test with natural language queries!
