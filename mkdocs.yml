          - Schema Enrichment: guides/schema-enrichment.md
          - Chain of Thoughts: guides/chain-of-thoughts.md
      - Setup & Tools:
          - CLI Reference: guides/cli-reference.md
          - MCP Server: guides/mcp-server.md
          - Claude Desktop Setup: guides/claude-desktop-setup.md
