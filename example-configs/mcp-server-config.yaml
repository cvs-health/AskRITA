# AskRITA MCP Server Configuration
# This config is used when running: askrita mcp --config mcp-server-config.yaml

llm:
  provider: "openai"
  # API key is read from OPENAI_API_KEY environment variable
  # Set it with: export OPENAI_API_KEY="your-api-key-here"
  model: "gpt-4o"
  temperature: 0.1
  max_tokens: 4000

database:
  connection_string: "sqlite:///sample.db"
  
  # Schema caching for performance optimization
  cache_schema: true                # Enable schema caching for better performance
  schema_refresh_interval: 1800     # Cache expiry: 30 minutes (good for development/testing)
  
# Framework will use defaults
# framework:
#   log_level: "INFO"

business_rules:
  max_results: 1000
  query_timeout: 30
  enable_caching: true
  allowed_operations: ["SELECT", "SHOW", "DESCRIBE"]

workflow:
  steps:
    parse_question: true
    get_unique_nouns: true
    generate_sql: true
    validate_and_fix_sql: true
    execute_sql: true
    format_results: true
    choose_visualization: true
    format_data_for_visualization: true
    generate_followup_questions: true
  output_format: "json"
  max_retries: 3

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"