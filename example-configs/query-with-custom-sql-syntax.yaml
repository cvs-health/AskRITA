# Example configuration showing SQL syntax customization
# This allows database-specific SQL generation for edge cases

database:
  connection_string: "${DATABASE_URL}"  # e.g., "bigquery://project-id/dataset-name"
  
  # SQL syntax configuration (optional - has smart defaults)
  sql_syntax:
    # Explicit CAST type override (optional)
    # Uncomment to override automatic detection
    # cast_to_string: "STRING"  # BigQuery
    # cast_to_string: "VARCHAR"  # Snowflake, SQL Server
    # cast_to_string: "TEXT"  # PostgreSQL
    # cast_to_string: "CHAR"  # MySQL
    
    # Default mappings (auto-applied based on connection string)
    # These are built-in defaults, shown here for reference only
    default_cast_types:
      bigquery: "STRING"
      snowflake: "VARCHAR"
      postgresql: "TEXT"
      postgres: "TEXT"
      mysql: "CHAR"
      sqlserver: "VARCHAR"
      mssql: "VARCHAR"

llm:
  provider: "openai"
  model: "gpt-4o"
  temperature: 0.1

workflow:
  enable_parse_question: true
  enable_get_unique_nouns: true  # Uses sql_syntax.cast_to_string
  enable_generate_sql: true
  enable_validate_sql: true
  enable_execute_sql: true
  enable_format_results: true
  enable_choose_visualization: true
  enable_generate_followup_questions: true

chain_of_thoughts:
  enabled: true
  include_timing: true
  include_confidence: true

# ============================================================================
# USE CASES FOR CUSTOM SQL SYNTAX
# ============================================================================

# Use Case 1: Database with non-standard CAST syntax
# database:
#   connection_string: "custom-db://host/database"
#   sql_syntax:
#     cast_to_string: "VARCHAR(MAX)"  # SQL Server with MAX length

# Use Case 2: Override for performance tuning
# database:
#   connection_string: "postgresql://host/database"
#   sql_syntax:
#     cast_to_string: "VARCHAR(1000)"  # Limit size for performance

# Use Case 3: Legacy database with special requirements
# database:
#   connection_string: "oracle://host/service"
#   sql_syntax:
#     cast_to_string: "VARCHAR2(4000)"  # Oracle-specific type
