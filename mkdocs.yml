site_name: Ask RITA Documentation
site_description: Reasoning Interface for Text-to-Analytics — natural-language SQL, NoSQL, and data-science workflows powered by LLMs
site_url: https://cvs-health.github.io/AskRITA/

repo_url: https://github.com/cvs-health/AskRITA
repo_name: cvs-health/AskRITA

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cvs-health/AskRITA
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/askrita/

plugins:
  - search
  - termynal

extra_css:
  - stylesheets/theme.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home:
      - index.md
  - PyPI Repository 📦: https://pypi.org/project/askrita/
  - Getting Started:
        - Installation: installation.md
        - Usage Examples & API: usage-examples.md
        - Supported Platforms: supported-platforms.md
  - Usage:
      - Configuration:
          - Overview: configuration/overview.md
          - LLM Providers: configuration/llm-providers.md
          - Database: configuration/database.md
          - Workflow: configuration/workflow.md
          - PII/PHI Detection: configuration/pii-detection.md
          - Schema Descriptions: configuration/schema-descriptions.md
          - Security: configuration/security.md
          - Examples: configuration/examples.md
          - Troubleshooting: configuration/troubleshooting.md
      - Workflows:
          - SQL Workflow: guides/sql-workflow.md
          - Conversational SQL: guides/conversational-sql.md
          - Research Workflow (CRISP-DM): guides/research-workflow.md
          - Data Classification: guides/data-classification.md
          - NoSQL (MongoDB) Workflow: guides/nosql-workflow.md
      - Features:
          - Export (PPTX, PDF, Excel): guides/exports.md
